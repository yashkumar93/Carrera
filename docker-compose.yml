# =============================================================================
# Careerra — Production Docker Compose
#
# Usage (on the DigitalOcean droplet):
#   IMAGE_TAG=sha-abc1234 docker compose up -d
#
# The IMAGE_TAG variable is set by the GitHub Actions deploy job and written
# to /srv/careerra/.env before each deployment.
#
# Volumes that survive upgrades (host-mounted):
#   /srv/careerra/chroma_db        — ChromaDB vector store
#   /srv/careerra/firebase-sa.json — Firebase service account (read-only)
#   /srv/careerra/nginx/           — Nginx config + logs
#   /etc/letsencrypt               — SSL certificates (managed by Certbot)
# =============================================================================

services:

  # ── Nginx (reverse proxy + SSL termination) ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: careerra_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/careerra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/careerra/nginx/logs:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - careerra_net

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-yashkumar93}/careerra-frontend:${IMAGE_TAG:-latest}
    container_name: careerra_frontend
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - careerra_net

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-yashkumar93}/careerra-backend:${IMAGE_TAG:-latest}
    container_name: careerra_backend
    expose:
      - "8000"
    environment:
      # AI / Vector DB keys
      GROQ_API_KEY: ${GROQ_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-career-insights}
      PINECONE_NAMESPACE: ${PINECONE_NAMESPACE:-}

      # Firebase — path must match the volume mount below
      FIREBASE_CREDENTIALS_PATH: /app/firebase-service-account.json

      # CORS — comma-separated allowed origins (no trailing slash)
      CORS_ORIGINS_STR: ${CORS_ORIGINS_STR:-https://yourdomain.com}

      ENVIRONMENT: production
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    volumes:
      # ChromaDB persisted on host — never delete without backing up
      - /srv/careerra/chroma_db:/app/chroma_db
      # Firebase service account injected at runtime, never baked into image
      - /srv/careerra/firebase-sa.json:/app/firebase-service-account.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - careerra_net

networks:
  careerra_net:
    driver: bridge
