# =============================================================================
# Careerra — Nginx Reverse Proxy Configuration
#
# Copy this file to /srv/careerra/nginx/default.conf on the droplet.
# The docker-compose.yml mounts it as a read-only volume.
#
# Replace EVERY occurrence of "yourdomain.com" with your real domain before use.
# =============================================================================

# ── Rate limiting zones ────────────────────────────────────────────────────
# Limit chat/stream to 10 req/s per IP to complement the FastAPI slowapi limit.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# General site: 30 req/s per IP
limit_req_zone $binary_remote_addr zone=site_limit:10m rate=30r/s;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Let's Encrypt ACME challenge (needed for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com;

    # ── SSL ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # HSTS — tells browsers to always use HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/xml text/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Next.js static assets (long-lived cache) ───────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        limit_req zone=site_limit burst=50 nodelay;
    }

    # ── Backend API (non-streaming) ────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        client_max_body_size 20M;   # allow resume uploads
    }

    # ── Backend SSE streaming (chat) — special settings ────────────────────
    # Streaming requires: no buffering, no proxy cache, long timeout.
    location /api/chat/stream {
        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE-critical settings
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        300s;   # 5 min — long enough for any LLM response
        chunked_transfer_encoding on;
        proxy_set_header          Connection '';
    }

    # ── FastAPI docs (optional — comment out in prod if you don't want them public)
    location /docs {
        proxy_pass       http://backend:8000/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass       http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Next.js frontend (everything else) ────────────────────────────────
    location / {
        limit_req zone=site_limit burst=30 nodelay;

        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/careerra_access.log;
    error_log  /var/log/nginx/careerra_error.log  warn;
}
